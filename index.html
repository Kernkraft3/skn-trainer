<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SKN Trainer · Sachkundenachweis Seenotsignalmittel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0b1f33;
    --bg-mid: #123049;
    --bg-surface: #18405f;
    --bg-card: rgba(255,255,255,0.04);
    --bg-card-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.09);
    --border-strong: rgba(255,255,255,0.18);
    --text: #eef4f8;
    --text-dim: #9cb0c2;
    --text-muted: #6b8298;
    --accent: #ff7a3d;         /* Signal orange - Rauch */
    --accent-red: #e63946;     /* Signal rot */
    --accent-green: #7fbd81;   /* Richtig */
    --accent-yellow: #f4c05d;  /* Hinweis */
    --shadow: 0 10px 40px rgba(0,0,0,.35);
    --radius: 10px;
    --radius-lg: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior: none;
  }

  body {
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
    background: var(--bg-deep);
    background-image:
      radial-gradient(ellipse at top, rgba(25, 75, 120, 0.4) 0%, transparent 60%),
      radial-gradient(ellipse at bottom left, rgba(255, 122, 61, 0.08) 0%, transparent 50%),
      linear-gradient(180deg, #0b1f33 0%, #071624 100%);
    min-height: 100vh;
    min-height: 100dvh;
    line-height: 1.55;
  }

  .app {
    max-width: 780px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }

  /* ===== HEADER ===== */
  header {
    margin-bottom: 28px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }

  .brand-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-red) 100%);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 4px 12px rgba(255, 122, 61, 0.3);
  }

  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: 24px;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }

  .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    margin-top: 6px;
  }

  /* ===== PROGRESS BAR ===== */
  .progress-strip {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    font-size: 13px;
  }

  .progress-bar {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-red));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .progress-text {
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  /* ===== MODE TABS ===== */
  .tabs-row1 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    padding: 4px;
    background: rgba(0,0,0,0.25);
    border-radius: var(--radius) var(--radius) 0 0;
    margin-bottom: 2px;
  }

  .tabs-row2 {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 4px;
    padding: 4px;
    background: rgba(0,0,0,0.15);
    border-radius: 0 0 var(--radius) var(--radius);
    margin-bottom: 22px;
  }

  .tabs-row2.hidden {
    display: none;
  }

  .tab {
    padding: 9px 8px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 7px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    background: var(--bg-surface);
    color: var(--text);
    box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset;
  }

  .tab-sub {
    padding: 7px 8px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .tab-sub:hover { color: var(--text); }

  .tab-sub.active {
    background: rgba(255,122,61,0.15);
    color: var(--accent);
    box-shadow: 0 1px 0 rgba(255,122,61,0.1) inset;
  }

  @media (max-width: 520px) {
    .tab { font-size: 11px; padding: 8px 4px; }
    .tab-sub { font-size: 11px; padding: 6px 4px; }
  }

  /* ===== CARD ===== */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 26px 22px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .q-number {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-weight: 500;
  }

  .q-type-badge {
    padding: 3px 9px;
    border-radius: 10px;
    font-size: 10px;
    background: rgba(255, 122, 61, 0.12);
    color: var(--accent);
    border: 1px solid rgba(255, 122, 61, 0.25);
  }

  .q-type-badge.free {
    background: rgba(127, 189, 129, 0.1);
    color: var(--accent-green);
    border-color: rgba(127, 189, 129, 0.25);
  }

  .question {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 20px;
    font-weight: 500;
    line-height: 1.35;
    margin-bottom: 22px;
    letter-spacing: -0.005em;
  }

  /* ===== OPTIONS (MC) ===== */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    gap: 12px;
    padding: 14px 16px;
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    line-height: 1.45;
    -webkit-tap-highlight-color: transparent;
  }

  .option:hover { background: var(--bg-card-hover); border-color: var(--border-strong); }

  .option .mark {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 5px;
    border: 1.5px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    background: rgba(0,0,0,0.15);
    transition: all 0.15s;
  }

  .option.selected .mark {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .option.selected {
    border-color: var(--accent);
    background: rgba(255, 122, 61, 0.08);
  }

  .option.correct {
    border-color: var(--accent-green);
    background: rgba(127, 189, 129, 0.12);
  }
  .option.correct .mark {
    background: var(--accent-green);
    border-color: var(--accent-green);
    color: var(--bg-deep);
  }

  .option.incorrect {
    border-color: var(--accent-red);
    background: rgba(230, 57, 70, 0.1);
  }
  .option.incorrect .mark {
    background: var(--accent-red);
    border-color: var(--accent-red);
    color: white;
  }

  .option.disabled { pointer-events: none; }

  /* ===== FREETEXT ===== */
  .freetext-input {
    width: 100%;
    min-height: 110px;
    padding: 14px 16px;
    background: rgba(0,0,0,0.2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    line-height: 1.5;
    resize: vertical;
    transition: border-color 0.15s;
  }

  .freetext-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .reference-answer {
    margin-top: 16px;
    padding: 16px;
    background: rgba(127, 189, 129, 0.07);
    border: 1px solid rgba(127, 189, 129, 0.25);
    border-left: 3px solid var(--accent-green);
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.55;
  }

  .reference-answer .ref-label {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent-green);
    font-weight: 600;
    margin-bottom: 6px;
  }

  /* ===== FLASHCARD ===== */
  .flashcard-reveal {
    margin-top: 16px;
    padding: 18px 18px;
    background: rgba(244, 192, 93, 0.06);
    border: 1px solid rgba(244, 192, 93, 0.25);
    border-left: 3px solid var(--accent-yellow);
    border-radius: var(--radius);
    font-size: 15px;
    line-height: 1.55;
    animation: fadeIn 0.25s ease;
  }

  .flashcard-reveal .ref-label {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent-yellow);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .flashcard-reveal .opt-list {
    display: flex; flex-direction: column; gap: 8px;
    margin-top: 8px;
  }

  .flashcard-reveal .opt-list .fc-opt {
    padding: 9px 12px;
    border-radius: 7px;
    font-size: 14px;
    border: 1px solid transparent;
    line-height: 1.4;
  }
  .flashcard-reveal .opt-list .fc-opt.correct {
    background: rgba(127, 189, 129, 0.12);
    border-color: rgba(127, 189, 129, 0.35);
  }
  .flashcard-reveal .opt-list .fc-opt.wrong {
    background: rgba(255,255,255,0.03);
    color: var(--text-dim);
  }
  .fc-opt .fc-label {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    margin-right: 6px;
  }
  .fc-opt.correct .fc-label { color: var(--accent-green); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: none; }
  }

  /* ===== ACTION BUTTONS ===== */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 22px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    min-width: 0;
    padding: 13px 18px;
    border-radius: var(--radius);
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:hover { background: var(--bg-card-hover); }
  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-red) 100%);
    border-color: transparent;
    color: white;
    font-weight: 600;
    box-shadow: 0 4px 14px rgba(255, 122, 61, 0.25);
  }
  .btn-primary:hover { filter: brightness(1.08); }

  .btn-success {
    background: rgba(127, 189, 129, 0.15);
    border-color: rgba(127, 189, 129, 0.4);
    color: var(--accent-green);
  }
  .btn-success:hover { background: rgba(127, 189, 129, 0.25); }

  .btn-danger {
    background: rgba(230, 57, 70, 0.12);
    border-color: rgba(230, 57, 70, 0.4);
    color: #ffa5ac;
  }
  .btn-danger:hover { background: rgba(230, 57, 70, 0.2); }

  .btn-ghost {
    flex: 0 0 auto;
    padding: 10px 14px;
    background: transparent;
    border: 1px solid var(--border);
    font-size: 13px;
    white-space: nowrap;
  }

  @media (max-width: 520px) {
    .btn-ghost {
      padding: 10px 12px;
      font-size: 12px;
    }
    .actions .btn-primary {
      flex: 1 1 0;
      min-width: 0;
    }
  }

  /* ===== FEEDBACK BANNER ===== */
  .feedback {
    padding: 14px 16px;
    border-radius: var(--radius);
    margin-top: 16px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeIn 0.2s;
  }

  .feedback.correct {
    background: rgba(127, 189, 129, 0.14);
    border: 1px solid rgba(127, 189, 129, 0.35);
    color: var(--accent-green);
  }

  .feedback.incorrect {
    background: rgba(230, 57, 70, 0.12);
    border: 1px solid rgba(230, 57, 70, 0.4);
    color: #ffa5ac;
  }

  .feedback-icon {
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ===== STATS PANEL ===== */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 16px;
  }

  .stat-box {
    padding: 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-align: center;
  }

  .stat-box .n {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .stat-box .l {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .stat-box.good .n { color: var(--accent-green); }
  .stat-box.bad  .n { color: var(--accent-red); }
  .stat-box.neutral .n { color: var(--text-dim); }

  /* ===== EXAM MODE ===== */
  .exam-header {
    padding: 14px 16px;
    background: linear-gradient(135deg, rgba(230, 57, 70, 0.12), rgba(255, 122, 61, 0.08));
    border: 1px solid rgba(230, 57, 70, 0.3);
    border-radius: var(--radius);
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .exam-header .title {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 600;
  }
  .exam-header .points {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--accent);
  }

  /* ===== MENU / SETTINGS ===== */
  .menu-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
  }

  .menu-row .label { font-size: 14px; }
  .menu-row .hint { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .menu-row button {
    padding: 7px 12px;
    background: var(--bg-surface);
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
  }

  /* ===== EXAM RESULTS ===== */
  .result-hero {
    text-align: center;
    padding: 32px 20px;
  }

  .result-score {
    font-family: 'Fraunces', serif;
    font-size: 72px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .result-score.pass { color: var(--accent-green); }
  .result-score.fail { color: var(--accent-red); }

  .result-verdict {
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 10px;
    color: var(--text-dim);
  }

  .result-detail {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 14px;
  }

  /* ===== FOOTER ===== */
  footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.7;
  }

  footer a { color: var(--text-dim); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  /* Responsive */
  @media (max-width: 520px) {
    .app { padding: 18px 14px 60px; }
    h1 { font-size: 20px; }
    .card { padding: 20px 16px; }
    .question { font-size: 18px; }
    .tab { font-size: 11px; padding: 8px 4px; }
    .btn { padding: 12px 14px; font-size: 13px; }
    .result-score { font-size: 56px; }
  }

  /* ===== BROWSE MODE ===== */
  .browse-nav {
    display: grid;
    grid-template-columns: minmax(64px, auto) 1fr minmax(64px, auto);
    gap: 10px;
    align-items: center;
    margin-top: 20px;
  }

  .nav-btn {
    padding: 14px 22px;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-family: inherit;
    font-size: 22px;
    font-weight: 600;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    min-width: 64px;
    line-height: 1;
  }

  .nav-btn:hover:not(:disabled) {
    background: var(--bg-card-hover);
    border-color: var(--accent);
  }
  .nav-btn:active:not(:disabled) { transform: scale(0.95); }
  .nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .nav-jump {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 14px;
    color: var(--text-dim);
  }

  .nav-jump input {
    width: 54px;
    padding: 8px 6px;
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    text-align: center;
    font-weight: 600;
  }
  .nav-jump input:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* Browse reveal: answers always shown */
  .browse-answer-block {
    margin-top: 22px;
  }

  .browse-answer-block .answer-label {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent-green);
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .browse-answer-block .answer-label::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--accent-green);
    border-radius: 50%;
  }

  .browse-freetext-answer {
    padding: 16px;
    background: rgba(127, 189, 129, 0.07);
    border: 1px solid rgba(127, 189, 129, 0.3);
    border-left: 3px solid var(--accent-green);
    border-radius: var(--radius);
    font-size: 15px;
    line-height: 1.55;
  }

  .browse-mc-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .browse-mc-options .browse-opt {
    display: flex;
    gap: 12px;
    padding: 12px 14px;
    border-radius: var(--radius);
    font-size: 15px;
    line-height: 1.45;
    border: 1.5px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .browse-mc-options .browse-opt.correct {
    border-color: var(--accent-green);
    background: rgba(127, 189, 129, 0.12);
  }

  .browse-mc-options .browse-opt .mark {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 5px;
    border: 1.5px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    background: rgba(0,0,0,0.15);
  }

  .browse-mc-options .browse-opt.correct .mark {
    background: var(--accent-green);
    border-color: var(--accent-green);
    color: var(--bg-deep);
  }

  /* Shared: numbered list formatting for answers with enumerations */
  .answer-list {
    list-style: none;
    padding: 0;
    margin: 0;
    counter-reset: ans-item;
  }
  .answer-list li {
    counter-increment: ans-item;
    padding-left: 28px;
    position: relative;
    margin-bottom: 10px;

const QUESTIONS = [{"num":1,"type":"free","question":"Was versteht man unter pyrotechnischen Seenotsignalen?","answer":"Notsignale, die mit Hilfe explosionsgefährlicher Stoffe ausgelöst werden."},{"num":2,"type":"free","question":"Was versteht man unter pyrotechnischer Munition?","answer":"Munition, die explosionsgefährliche Stoffe oder Stoffgemische enthält und einen Licht-, Schall-, Rauch- oder ähnlichen Effekt erzeugt und keine zweckbestimmte Durchschlagskraft im Ziel entfaltet."},{"num":3,"type":"free","question":"Was sind explosionsgefährliche Stoffe?","answer":"Feste oder flüssige Stoffe und Zubereitungen, die durch eine nicht außergewöhnliche Beanspruchung (thermisch, mechanisch oder andere) zur Explosion gebracht werden können."},{"num":4,"type":"mc","question":"Was darf zur pyrotechnischen Notsignalgebung verwendet werden?","options":[{"label":"a","text":"Die Signalpistole Kaliber 4 (26,5 mm)"},{"label":"b","text":"Signalwaffen mit Zulassung der Physikalisch-Technischen Bundesanstalt (PTB)"},{"label":"c","text":"die von der Bundesanstalt für Materialforschung und -prüfung (BAM) zugelassenen sonstigen Notsignale."}],"correct_labels":["a","b","c"]},{"num":5,"type":"mc","question":"Welche Arten von Zündern werden bei Not-Handfackeln gewöhnlich verwendet und wie funktionieren sie?","options":[{"label":"a","text":"Reibkopf-Zündung – funktioniert wie ein Streichholz, zündet mit einer Verzögerung direkt den Leuchtsatz (nicht mehr im deutschen Handel)"},{"label":"b","text":"Luntenzünder – durch das Entzünden einer Lunte wird nach gewisser Zeit der eigentlichen Signalsatz gezündet."},{"label":"c","text":"Reißzünder – ein Draht im Inneren wird durch einen reibempfindlichen pyrotechnischen Anzündsatz gezogen, der dann den eigentlichen Signalsatz zündet."}],"correct_labels":["a","c"]},{"num":6,"type":"free","question":"Wann dürfen pyrotechnische Notsignale verwendet werden?","answer":"Nur im Notfall, d.h. unter anderem, wenn angezeigt werden soll, dass Gefahr für Leib und Leben besteht und Hilfe erforderlich ist."},{"num":7,"type":"mc","question":"Was ist sicherheitstechnisch bei der Verwendung einer Seenot-Handfackel zu beachten?","options":[{"label":"a","text":"Die brennende Fackel nach Lee waagerecht so halten, dass versprühter Abbrand keine Verletzungen (Hand, Augen) verursacht oder das Boot/Schiff beschädigt."},{"label":"b","text":"Die brennende Fackel nach Luv waagerecht so halten, dass versprühter Abbrand keine Verletzungen (Hand, Augen) verursacht oder das Boot/Schiff beschädigt."},{"label":"c","text":"Gebrauchsanweisung beachten."}],"correct_labels":["a","c"]},{"num":8,"type":"mc","question":"Was ist bei der Verwendung von Seenot-Rauchsignalen zu beachten?","options":[{"label":"a","text":"Rauchsignale nur am Tage und bei geringen Windstärken verwenden."},{"label":"b","text":"Die Anzündung erfolgt durch eine Reißschnur, die unter einer abschraubbaren Schutzkappe liegt."},{"label":"c","text":"Nach der Zündung ist das Rauchsignal zur Leeseite außenbords zu werfen."}],"correct_labels":["a","b","c"]},{"num":9,"type":"mc","question":"Welche pyrotechnischen Seenot-Signalmittel werden an Bord verwendet?","options":[{"label":"a","text":"Signalraketen und Fallschirmraketen"},{"label":"b","text":"Rauchtöpfe und Bengalische Feuer"},{"label":"c","text":"Handfackeln und Rauchsignale"}],"correct_labels":["a","c"]},{"num":10,"type":"mc","question":"Zu welchem Zweck, außer der Signalgebung, kann die „Signalwaffe“ im Kaliber 4 (26,5 mm) noch verwendet werden?","options":[{"label":"a","text":"An Silvester zum Abschuss von Leuchtfeuerwerk."},{"label":"b","text":"Als Abschussgerät für einen Trägerkörper zur Herstellung einer ersten Leinenverbindung."},{"label":"c","text":"Die Verwendung als Startpistole ist im Rahmen von Regatten erlaubt, wenn eine Schießerlaubnis vorliegt"}],"correct_labels":["b","c"]},{"num":11,"type":"free","question":"Wann sind Rauchsignale zu verwenden?","answer":"Nur am Tag und erst wenn Hilfe gesichtet worden ist."},{"num":12,"type":"mc","question":"Welche Farbe ist bei Signalraketen international als Notsignal zu verwenden?","options":[{"label":"a","text":"Rot"},{"label":"b","text":"Weiß"},{"label":"c","text":"Grün"}],"correct_labels":["a"]},{"num":13,"type":"mc","question":"Wann dürfen Notsignale verwendet werden?","options":[{"label":"a","text":"In Notfällen, wenn unter anderem Leib und Leben von Personen in Gefahr sind und dringend fremde Hilfe benötigt wird."},{"label":"b","text":"In Notfällen, wenn bedeutende Sachwerte in Gefahr sind und dringend fremde Hilfe benötigt wird."},{"label":"c","text":"Ausschließlich wenn alle anderen Kommunikationsmittel ausgefallen sind."}],"correct_labels":["a","b"]},{"num":14,"type":"mc","question":"Wie lang ist die Verbrauchsdauer pyrotechnischer Notsignale bei sachgemäßer Lagerung?","options":[{"label":"a","text":"Die Verbrauchsdauer ist unbegrenzt."},{"label":"b","text":"Soweit auf dem einzelnen Gegenstand nichts anderes vermerkt ist, max. 3 Jahre."},{"label":"c","text":"Maximal 10 Jahre"}],"correct_labels":["b"]},{"num":15,"type":"mc","question":"Was verkürzt die durch den Hersteller vorgegebene Verbrauchsdauer pyrotechnischer Notsignale oder beeinträchtigt ihre sichere Verwendung?","options":[{"label":"a","text":"Feuchtigkeit und Korrosion"},{"label":"b","text":"hohe Lagertemperaturen"},{"label":"c","text":"mechanische Beschädigung"}],"correct_labels":["a","b","c"]},{"num":16,"type":"mc","question":"Was machen Sie mit überlagerten pyrotechnischen Notsignalen?","options":[{"label":"a","text":"Können über den Hausmüll entsorgt werden."},{"label":"b","text":"Über den Munitionshandel zurückgeben oder Delaborierbetrieben übergeben."},{"label":"c","text":"Können auch als Feuerwerkskörper verwenden werden."}],"correct_labels":["b"]},{"num":17,"type":"mc","question":"Wie lange dürfen Sie Signalmunition verwenden?","options":[{"label":"a","text":"Drei Jahre ab Kauf im Fachhandel."},{"label":"b","text":"Fünf Jahre ab Herstellung im Werk."},{"label":"c","text":"Das Verfallsdatum ist auf der Munition und/oder der Verpackung angebracht."}],"correct_labels":["c"]},{"num":18,"type":"mc","question":"Wie darf Signalmunition entsorgt werden?","options":[{"label":"a","text":"Durch Rückgabe an den Fachhandel."},{"label":"b","text":"Durch Abgabe bei einer Sondermüll- und Gefahrstoffsammelstelle."},{"label":"c","text":"Öffnen der Patrone, Durchfeuchten des Inhaltes mit Wasser, dann wie b)."}],"correct_labels":["a"]},{"num":19,"type":"mc","question":"Wie ist pyrotechnische Munition während der Liegezeit im Hafen zu lagern?","options":[{"label":"a","text":"Keine bestimmte Lagerung erforderlich."},{"label":"b","text":"Möglichst originalverpackt, kühl und trocken in einem Metallbehältnis mit Schwenkriegelschloss."},{"label":"c","text":"Die Munition darf keinesfalls an Bord gelagert werden."}],"correct_labels":["b"]},{"num":20,"type":"mc","question":"Wie ist an Bord eines seegehenden Schiffes im Hafen eine Signalpistole im Kaliber 4 (26,5 mm) aufzubewahren?","options":[{"label":"a","text":"In einem mit dem Schiffskörper sicher verankertem Behältnis aus Stahlblech. Die Tür muss mindestens 4mm dick und elektronisch oder mechanisch verriegelt sein (sog. Hamburger Kasten)."},{"label":"b","text":"Die Signalpistole kann frei zugänglich an Bord gelagert werden."},{"label":"c","text":"Die Signalpistole darf keinesfalls an Bord gelagert werden."}],"correct_labels":["a"]},{"num":21,"type":"mc","question":"Wem kann zum Zweck der sicheren Aufbewahrung an Land die Signalpistole im Kaliber 4 (26,5 mm) übergeben werden?","options":[{"label":"a","text":"Einer Person mit bestandener Sachkundeprüfung."},{"label":"b","text":"Nur einem Berechtigten, z.B. mit Waffenbesitzkarte."},{"label":"c","text":"Einer zuverlässigen Person, die mindestens 18 Jahre alt ist."}],"correct_labels":["b"]},{"num":22,"type":"mc","question":"Wie ist an Land eine Signalpistole im Kaliber 4 (26,5 mm) aufzubewahren?","options":[{"label":"a","text":"In einem Behältnis der Sicherheitsstufe A (VDMA 24992)."},{"label":"b","text":"In einem Behältnis der Sicherheitsstufe DIN/EN 1143-1 Widerstandsgrad 0 oder I. Bei Fortführung einer Nutzung eines Behältnisses der Sicherheitsstufe B nach VDMA 24992, die vor dem 06.07.2017 begründet werden, kann dieses Behältnis weitergenutzt werden."},{"label":"c","text":"In einem Stahlblechschrank mit Schwenkriegelschloss."}],"correct_labels":["b"]},{"num":23,"type":"mc","question":"Wie ist eine Signalpistole im Kaliber 4 (26,5 mm) aufzubewahren, wenn sich die Yacht im Winterlager befindet?","options":[{"label":"a","text":"Eine Aufbewahrung an Bord ist nur mit einer speziellen behördlichen Erlaubnis möglich."},{"label":"b","text":"Eine Aufbewahrung an Land in einem Behältnis der Sicherheitsstufe DIN/EN 1143-1 Widerstandsgrad 0 oder I. Bei Fortführung einer Nutzung eines Behältnisses der Sicherheitsstufe B nach VDMA 24992, die vor dem 06.07.2017 begründet werden, kann dieses Behältnis weitergenutzt werden."},{"label":"c","text":"In einem Stahlblechschrank mit Schwenkriegelschloss."}],"correct_labels":["a","b"]},{"num":24,"type":"mc","question":"Wie ist an Land erlaubnispflichtige Munition aufzubewahren?","options":[{"label":"a","text":"Munition darf nicht an Land aufbewahrt werden."},{"label":"b","text":"Es gibt keine Auflagen für die Aufbewahrung von pyrotechnischer Munition."},{"label":"c","text":"Mindestens in einem Stahlblechbehältnis (klassifizierungsfrei), das mit einem Schwenkriegelschloss oder einem gleichwertigen Verschluss gesichert ist, oder in einem gleichwertigen Behältnis."}],"correct_labels":["c"]},{"num":25,"type":"free","question":"Warum sollte pyrotechnische Munition möglichst original verpackt gelagert werden?","answer":"Diese Verpackungen sind in der Regel wasserdicht und schwimmfähig."},{"num":26,"type":"mc","question":"Wie ist die Signalmunition während der Fahrt zu lagern?","options":[{"label":"a","text":"Wie bei einem längeren Aufenthalt im Hafen."},{"label":"b","text":"Zugriffsbereit in der Nähe der Signalwaffe."},{"label":"c","text":"Nicht zugriffsbereit, in größerer Entfernung zur Signalwaffe."}],"correct_labels":["b"]},{"num":27,"type":"mc","question":"Wozu berechtigt eine Waffenbesitzkarte (ausgestellt für das Bedürfnis als Inhaber eines seegehenden Schiffes)?","options":[{"label":"a","text":"Mit entsprechendem Voreintrag zum Erwerb, sowie zum Besitz einer Signalpistole."},{"label":"b","text":"Zum Führen der Waffe an Land."},{"label":"c","text":"Zum Erwerb der zur Signalpistole gehörigen Munition bei entsprechendem Eintrag."}],"correct_labels":["a","c"]},{"num":28,"type":"free","question":"Wo ist eine Waffenbesitzkarte für Inhaber von seegehenden Schiffen zu beantragen?","answer":"Bei der zuständigen Behörde des Wohnortes (nicht des Liegeplatzes)."},{"num":29,"type":"mc","question":"Welche Signalwaffen darf der Inhaber eines Kleinen Waffenscheins führen?","options":[{"label":"a","text":"Alle"},{"label":"b","text":"Nur amtlich beschossene Signalwaffen im Kaliber unter 12 mm."},{"label":"c","text":"Nur Signalwaffen mit dem Zulassungszeichen „PTB im Kreis“."}],"correct_labels":["c"]},{"num":30,"type":"mc","question":"Was haben Sie nach dem Erwerb einer erlaubnispflichtigen Signalpistole zu tun?","options":[{"label":"a","text":"Innerhalb von 2 Wochen nach dem Erwerb habe ich der zuständigen Behörde den Erwerb schriftlich oder in elektronischer Form anzuzeigen."},{"label":"b","text":"Waffenbesitzkarte der zuständigen Behörde zur Eintragung des Erwerbs mit entsprechenden Erwerbsnachweisen (Kaufvertrag, Überlassungsvertrag etc.) vorlegen."},{"label":"c","text":"Es ist keine weitere Handlung erforderlich."}],"correct_labels":["a","b"]},{"num":31,"type":"free","question":"Welche Signalwaffen können frei erworben und an Bord mitgeführt werden?","answer":"Signalwaffen (SRS-Waffen) mit dem Bauartzulassungszeichen der Physikalisch-Technischen Bundesanstalt („PTB im Kreis“)."},{"num":32,"type":"mc","question":"Welche Voraussetzungen müssen gegeben sein, um eine Waffenbesitzkarte für eine Signalpistole, Kaliber 4 (26,5 mm), erwerben zu können?","options":[{"label":"a","text":"Der Antragsteller muss das 18. Lebensjahr vollendet haben."},{"label":"b","text":"Der Antragsteller muss zuverlässig, sachkundig und persönlich geeignet sein, und ein amts- oder fachärztliches oder fachpsychologisches Zeugnis vorlegen, sofern das 25. Lebensjahr noch nicht vollendet ist."},{"label":"c","text":"Es muss ein Bedürfnis vorliegen (Inhaber eines seegängigen Wasserfahrzeugs)."}],"correct_labels":["a","b","c"]},{"num":33,"type":"mc","question":"Wie kann ein Wassersportler nachweisen, dass ein Bedürfnis für den Erwerb einer Signalpistole vorliegt?","options":[{"label":"a","text":"Durch Vorlage von Unterlagen, aus denen der Besitz eines seegängigen Wasserfahrzeugs (Kaufvertrag, Chartervertrag, Versicherungspolice, Standerschein, Internationaler Bootsschein usw.)"},{"label":"b","text":"Durch Vorlage eines Sportbootführerscheins."},{"label":"c","text":"Durch Vorlage von Unterlagen, aus denen die Notwendigkeit für Lehr- und Prüfungszwecke hervorgeht."}],"correct_labels":["a","c"]},{"num":34,"type":"mc","question":"Welche amtlichen Dokumente berechtigen zum Erwerb von erlaubnispflichtiger pyrotechnischer Munition?","options":[{"label":"a","text":"Die Waffenbesitzkarte mit entsprechender Munitionserwerbsberechtigung."},{"label":"b","text":"Ein entsprechender Munitionserwerbsschein."},{"label":"c","text":"Ein Kleiner Waffenschein."}],"correct_labels":["a","b"]},{"num":35,"type":"mc","question":"Welche pyrotechnischen Seenotsignale können erlaubnisfrei erworben, aufbewahrt und verwendet werden von Personen, die das 18. Lebensjahr vollendet haben?","options":[{"label":"a","text":"Die der Unterklasse P1, d.h. „Handfackeln rot“ und bestimmte Rauchsignale, Abschussgeräte ohne Schusswaffeneigenschaft."},{"label":"b","text":"Seenotsignalgeber mit einer Steighöhe von bis etwa 60 Metern (Signalgeber und ihre Munition, die nicht dem WaffG unterliegen)"},{"label":"c","text":"Die der Unterklasse T2, d.h. „Signalraketen rot“, „Fallschirmsignalraketen rot“ und bestimmte Rauchsignale."}],"correct_labels":["a","b"]},{"num":36,"type":"free","question":"Welche erlaubnispflichtigen pyrotechnischen Seenotsignale dürfen Wassersportler mit einem im Führerschein eingedruckten Befreiungsvermerk bzw. Sachkundenachweis erwerben?","answer":"Die der Unterklasse P2, d.h. „Signalraketen rot“, „Fallschirmsignalraketen rot“ und bestimmte Rauchsignale."},{"num":37,"type":"free","question":"Bis zu welchem Alter ist vom Antragsteller auf erstmalige Erteilung einer waffenrechtlichen Genehmigung zum Erwerb einer Signalpistole Kaliber 4 (26,5 mm) stets ein ärztliches oder fachpsychologisches Zeugnis beizubringen?","answer":"Bis zur Vollendung des 25. Lebensjahres."},{"num":38,"type":"mc","question":"Darf mit einem Bootsführerschein mit eingetragenem Befreiungsvermerk nach dem Waffen- und Sprengstoffgesetz Seenotsignalmunition im Kaliber 4 erworben werden?","options":[{"label":"a","text":"Nein, hierfür ist eine Waffenbesitzkarte mit eingetragener Munitionserwerbsberechtigung für das Kaliber 4 erforderlich."},{"label":"b","text":"Nein, hierfür ist eine Waffenbesitzkarte mit einer eingetragenen Signalwaffe im Kaliber 4 erforderlich."},{"label":"c","text":"Ja, die Waffenbesitzkarte wird nur für den Waffenerwerb benötigt und dient als Legitimation für den Waffenbesitz."}],"correct_labels":["a"]},{"num":39,"type":"mc","question":"Welches ist das Zulassungszeichen für pyrotechnische Munition nach § 10 BeschG?","options":[{"label":"a","text":"PTB im Kreis (Physikalisch-Technischen Bundesanstalt)"},{"label":"b","text":"BAM-Zeichen (Bundesanstalt für Materialforschung und –prüfung)"},{"label":"c","text":"Bundesadler, B (Böllerbeschuss)"}],"correct_labels":["b"]},{"num":40,"type":"mc","question":"Neben dem Zulassungszeichen (BAM) folgt zusätzlich eine Klasseneinteilung. Welche Klassen gibt es?","options":[{"label":"a","text":"P1 (Bsp.: Handfackeln)"},{"label":"b","text":"SM 1 (Signalmunition der Klasse 1)"},{"label":"c","text":"P2 (Bsp.: Signalraketen bzw. Fallschirmsignalraketen mit einer Steighöhe von bis zu 300 Metern)"}],"correct_labels":["a","c"]},{"num":41,"type":"free","question":"Nennen Sie sechs pyrotechnische Notsignale!","answer":"1. Signalraketen, rot 2. Fallschirmsignalraketen, rot 3. Handfackeln, rot 4. Rauchsignale, orange 5. Lichtrauchsignale 6. Blitz-Knall-Patronen"},{"num":42,"type":"mc","question":"Welche Farben haben pyrotechnische Notsignale?","options":[{"label":"a","text":"Leuchtsignale rot"},{"label":"b","text":"Rauchsignale orange"},{"label":"c","text":"Leuchtsignal gelb"}],"correct_labels":["a","b"]},{"num":43,"type":"free","question":"Was ist bei allen steigenden Seenotsignalen unbedingt zu beachten?","answer":"1. Auf freies Schussfeld achten (z.B. Mast und Segel), 2. Signalgerät senkrecht (ggf. in den Wind geneigt) nach oben halten, 3. beim Handhaben und Abfeuern nicht auf Personen richten und selbst nicht mit Körperteilen oder Kleidung vor die Mündung kommen, 4. nicht an Versagern hantieren, sondern diese über Bord werfen."},{"num":44,"type":"mc","question":"Was ist bei steigenden Notsignalen zu beachten?","options":[{"label":"a","text":"freies Schussfeld"},{"label":"b","text":"Windrichtung und Abschusswinkel"},{"label":"c","text":"keine entflammbaren Gegenstände im Gefahrenbereich"}],"correct_labels":["a","b","c"]},{"num":45,"type":"free","question":"Welche Vorteile haben Signalraketen bzw. Signalpatronen, die mit Fallschirmen ausgerüstet sind, gegenüber Signalsternen?","answer":"Auf Grund geringerer Sinkgeschwindigkeit (5 m/s) ist eine längere Sichtbarkeit/ Brenndauer möglich; dadurch haben sie einen höheren Aufmerksamkeitswert."},{"num":46,"type":"mc","question":"Woraufhin sind pyrotechnische Seenotsignale ständig zu überwachen, damit die Funktionsfähigkeit gewährleistet ist?","options":[{"label":"a","text":"Verbrauchsdauer/Verfallsdatum beachten."},{"label":"b","text":"Auf Korrosion oder Beschädigung prüfen."}],"correct_labels":["a","b"]},{"num":47,"type":"free","question":"Mit welchen Zeichen ist Notsignalmunition im Kaliber 4 gekennzeichnet?","answer":"1. Bezeichnung der Munition und der Verbrauchsdauer. 2. Bei „Notsignalen rot“ durchgehende Rändelung des Patronenbodenrandes und roter Lackverschlussdeckel."},{"num":48,"type":"mc","question":"Welche Steighöhe und Leuchtdauer haben Fallschirmsignalpatronen?","options":[{"label":"a","text":"Steighöhe mindestens 300 m, Leuchtdauer mindestens 30 Sekunden."},{"label":"b","text":"Steighöhe mindestens 100 m, Leuchtdauer mindestens 10 Sekunden."},{"label":"c","text":"Steighöhe mindestens 50 m, Leuchtdauer mindestens 50 Sekunden."}],"correct_labels":["a"]},{"num":49,"type":"free","question":"Woran erkennen Sie an einem pyrotechnischen Notsignal, um welche Unterklasse es sich handelt?","answer":"Am Zulassungszeichen: BAM-PT1 oder BAM-PT2."},{"num":50,"type":"mc","question":"Wer darf pyrotechnische Notsignale der Klasse T verwenden?","options":[{"label":"a","text":"Jeder, der damit anzeigen will, dass ein Seenotfall vorliegt, d. h. unter anderem, dass Gefahr für Leib oder Leben der Besatzung und daher die Notwendigkeit zur Hilfe besteht."},{"label":"b","text":"An Silvester dürfen die Signale uneingeschränkt verwendet werden."},{"label":"c","text":"Jeder, der damit anzeigen will, dass ein Seenotfall vorliegt, obwohl keine Notwendigkeit zur Hilfe mehr besteht."}],"correct_labels":["a"]},{"num":51,"type":"mc","question":"Wie lang ist die Brenndauer einer Seenot-Handfackel?","options":[{"label":"a","text":"5-10 Sekunden"},{"label":"b","text":"5 Minuten"},{"label":"c","text":"30 bis 60 Sekunden"}],"correct_labels":["c"]},{"num":52,"type":"free","question":"Beschreiben Sie den allgemeinen Aufbau eines Seenot-Rauchsignals!","answer":"In einem Behälter befindet sich ein Anzünder (meist Reißzünder) mit Verzögerung, der einen pyrotechnischen Satz anzündet, der dann bis zu 4 Minuten lang orange-farbenen Rauch // ═══════════════════════════════════════════════════════════════════
//  STATE & PERSISTENCE
// ═══════════════════════════════════════════════════════════════════
const STORAGE_KEY = 'skn_trainer_state_v1';
const initialStats = () => {
  // Per-question stats: { correct: 0, wrong: 0, lastSeen: 0 }
  const stats = {};
  for (const q of QUESTIONS) stats[q.num] = { correct: 0, wrong: 0, lastSeen: 0 };
  return stats;
};

let state = {
  mode: 'browse',
  stats: initialStats(),
  currentQNum: null,
  history: [],
  exam: null,
  browseIdx: 0,
  mcSeqIdx: 0,
  freeSeqIdx: 0
};

async function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      // Merge with initial (in case new questions added)
      state.stats = { ...initialStats(), ...saved.stats };
      if (saved.mode) state.mode = saved.mode;
      if (typeof saved.browseIdx === 'number') state.browseIdx = saved.browseIdx;
      if (typeof saved.mcSeqIdx === 'number') state.mcSeqIdx = saved.mcSeqIdx;
      if (typeof saved.freeSeqIdx === 'number') state.freeSeqIdx = saved.freeSeqIdx;
    }
  } catch(e) { /* first run or storage unavailable */ }
}

async function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      mode: state.mode,
      stats: state.stats,
      browseIdx: state.browseIdx,
      mcSeqIdx: state.mcSeqIdx,
      freeSeqIdx: state.freeSeqIdx
    }));
  } catch(e) { /* storage unavailable */ }
}

function resetProgress() {
  state.stats = initialStats();
  state.history = [];
  saveState();
  render();
}

// ═══════════════════════════════════════════════════════════════════
//  QUESTION SELECTION
// ═══════════════════════════════════════════════════════════════════
function pickNextQuestion(pool) {
  // Weighted pick: prefer questions seen less often AND wrong recently.
  // Weight = 1 + 3*(wrong - correct) + bonus for never seen
  // Clamp to min weight of 0.2
  const weights = pool.map(q => {
    const s = state.stats[q.num];
    let w = 1;
    w += Math.max(0, 3 * (s.wrong - s.correct));       // punish wrong answers
    if (s.correct + s.wrong === 0) w += 2;             // boost unseen
    if (q.num === state.currentQNum) w *= 0.05;         // avoid immediate repeat
    // Recently seen penalty (avoid running over same 3 questions)
    const recentlySeen = state.history.slice(-4).includes(q.num);
    if (recentlySeen) w *= 0.15;
    return Math.max(0.2, w);
  });
  const total = weights.reduce((a,b) => a+b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) {
    r -= weights[i];
    if (r <= 0) return pool[i];
  }
  return pool[pool.length - 1];
}

function markAnswered(qNum, correct) {
  const s = state.stats[qNum];
  if (correct) s.correct++; else s.wrong++;
  s.lastSeen = Date.now();
  state.history.push(qNum);
  if (state.history.length > 20) state.history.shift();
  saveState();
}

// ═══════════════════════════════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════════════════════════════
const stage = document.getElementById('stage');

function updateProgressBar() {
  const learned = Object.values(state.stats).filter(s => s.correct >= 2 && s.correct > s.wrong).length;
  const pct = (learned / QUESTIONS.length) * 100;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progText').textContent = `${learned} / ${QUESTIONS.length} gelernt`;
}

// Two-row tab handling
// state.mode stays as before: 'browse', 'mc_seq', 'mc_rnd', 'free_seq', 'free_rnd', 'exam'
// Category map: which cat is active and whether row2 is shown
const CAT_MODES = {
  browse: { cat: 'browse', showRow2: false, defaultMode: 'browse' },
  mc_seq: { cat: 'mc',     showRow2: true,  defaultMode: 'mc_seq' },
  mc_rnd: { cat: 'mc',     showRow2: true,  defaultMode: 'mc_rnd' },
  free_seq: { cat: 'text', showRow2: true,  defaultMode: 'free_seq' },
  free_rnd: { cat: 'text', showRow2: true,  defaultMode: 'free_rnd' },
  exam: { cat: 'exam',     showRow2: false, defaultMode: 'exam' },
};

// Last used sub-mode per category (seq or rnd)
const lastSubMode = { mc: 'seq', text: 'seq' };

function updateTabUI() {
  const info = CAT_MODES[state.mode] || CAT_MODES['browse'];

  // Row 1: highlight active category
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cat === info.cat);
  });

  // Row 2: show/hide and highlight active sub-mode
  const row2 = document.getElementById('tabsRow2');
  if (info.showRow2) {
    row2.classList.remove('hidden');
    const isSeq = state.mode.endsWith('_seq');
    document.querySelectorAll('.tab-sub').forEach(t => {
      t.classList.toggle('active', (t.dataset.mode === 'seq') === isSeq);
    });
  } else {
    row2.classList.add('hidden');
  }
}

// Row 1 clicks
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const cat = tab.dataset.cat;
    if (cat === 'browse') state.mode = 'browse';
    else if (cat === 'exam') state.mode = 'exam';
    else if (cat === 'mc') state.mode = lastSubMode.mc === 'rnd' ? 'mc_rnd' : 'mc_seq';
    else if (cat === 'text') state.mode = lastSubMode.text === 'rnd' ? 'free_rnd' : 'free_seq';
    state.exam = null;
    saveState();
    render();
  });
});

// Row 2 clicks
document.querySelectorAll('.tab-sub').forEach(sub => {
  sub.addEventListener('click', () => {
    const subMode = sub.dataset.mode; // 'seq' or 'rnd'
    const info = CAT_MODES[state.mode];
    if (!info || !info.showRow2) return;
    if (info.cat === 'mc') {
      state.mode = subMode === 'rnd' ? 'mc_rnd' : 'mc_seq';
      lastSubMode.mc = subMode;
    } else if (info.cat === 'text') {
      state.mode = subMode === 'rnd' ? 'free_rnd' : 'free_seq';
      lastSubMode.text = subMode;
    }
    saveState();
    render();
  });
});

function render() {
  updateProgressBar();
  updateTabUI();

  if (state.mode === 'browse')        renderBrowse();
  else if (state.mode === 'mc_seq')   renderMCSeq();
  else if (state.mode === 'mc_rnd')   renderMC();
  else if (state.mode === 'free_seq') renderFreetextSeq();
  else if (state.mode === 'free_rnd') renderFreetext();
  else if (state.mode === 'exam')     renderExam();
}

// ───────── Browse mode (sequential, answers visible) ─────────
function renderBrowse() {
  // Clamp browseIdx into valid range
  if (state.browseIdx < 0) state.browseIdx = 0;
  if (state.browseIdx >= QUESTIONS.length) state.browseIdx = QUESTIONS.length - 1;

  const q = QUESTIONS[state.browseIdx];
  state.currentQNum = q.num;
  saveState();

  const typeBadge = q.type === 'mc'
    ? `<span class="q-type-badge">${q.correct_labels.length > 1 ? 'MEHRFACHAUSWAHL' : 'EINFACHAUSWAHL'}</span>`
    : `<span class="q-type-badge free">FREITEXT</span>`;

  // Build answer block
  let answerHTML;
  if (q.type === 'free') {
    answerHTML = `
      <div class="browse-answer-block">
        <div class="answer-label">Musterantwort</div>
        <div class="browse-freetext-answer">${renderAnswer(q.answer)}</div>
      </div>`;
  } else {
    const correctSet = new Set(q.correct_labels);
    answerHTML = `
      <div class="browse-answer-block">
        <div class="answer-label">Richtige Antwort${correctSet.size > 1 ? 'en' : ''}</div>
        <div class="browse-mc-options">
          ${q.options.map(opt => `
            <div class="browse-opt ${correctSet.has(opt.label) ? 'correct' : ''}">
              <span class="mark">${opt.label.toUpperCase()}</span>
              <span>${escapeHTML(opt.text)}</span>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  const isFirst = state.browseIdx === 0;
  const isLast = state.browseIdx === QUESTIONS.length - 1;

  stage.innerHTML = `
    <div class="card">
      <div class="q-meta">
        <span class="q-number">FRAGE ${String(q.num).padStart(2,'0')} / 89</span>
        ${typeBadge}
      </div>
      <div class="question">${escapeHTML(q.question)}</div>
      ${answerHTML}
      <div class="browse-nav">
        <button class="nav-btn" id="browsePrev" ${isFirst ? 'disabled' : ''} aria-label="Vorherige Frage">←</button>
        <div class="nav-jump">
          Springen zu
          <input type="number" id="browseJump" min="1" max="89" value="${q.num}" inputmode="numeric">
          / 89
        </div>
        <button class="nav-btn" id="browseNext" ${isLast ? 'disabled' : ''} aria-label="Nächste Frage">→</button>
      </div>
    </div>
  `;

  const goTo = (idx) => {
    state.browseIdx = idx;
    render();
    // Scroll to top smoothly when navigating
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  document.getElementById('browsePrev').addEventListener('click', () => {
    if (state.browseIdx > 0) goTo(state.browseIdx - 1);
  });
  document.getElementById('browseNext').addEventListener('click', () => {
    if (state.browseIdx < QUESTIONS.length - 1) goTo(state.browseIdx + 1);
  });

  const jumpInput = document.getElementById('browseJump');
  const jumpTo = () => {
    const n = parseInt(jumpInput.value, 10);
    if (!isNaN(n) && n >= 1 && n <= 89) {
      const idx = QUESTIONS.findIndex(x => x.num === n);
      if (idx >= 0) goTo(idx);
    } else {
      jumpInput.value = q.num;
    }
  };
  jumpInput.addEventListener('change', jumpTo);
  jumpInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); jumpTo(); jumpInput.blur(); }
  });
}

// Keyboard navigation (arrow keys) for browse + seq modes
document.addEventListener('keydown', (e) => {
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;

  if (state.mode === 'browse') {
    const MC_Q = QUESTIONS.filter(q => q.type === 'mc');
    const FR_Q = QUESTIONS.filter(q => q.type === 'free');
    if (e.key === 'ArrowLeft' && state.browseIdx > 0) { state.browseIdx--; render(); }
    else if (e.key === 'ArrowRight' && state.browseIdx < QUESTIONS.length - 1) { state.browseIdx++; render(); }
  } else if (state.mode === 'mc_seq') {
    const pool = QUESTIONS.filter(q => q.type === 'mc');
    if (e.key === 'ArrowLeft' && state.mcSeqIdx > 0) { state.mcSeqIdx--; render(); }
    else if (e.key === 'ArrowRight' && state.mcSeqIdx < pool.length - 1) { state.mcSeqIdx++; render(); }
  } else if (state.mode === 'free_seq') {
    const pool = QUESTIONS.filter(q => q.type === 'free');
    if (e.key === 'ArrowLeft' && state.freeSeqIdx > 0) { state.freeSeqIdx--; render(); }
    else if (e.key === 'ArrowRight' && state.freeSeqIdx < pool.length - 1) { state.freeSeqIdx++; render(); }
  }
});

// Shared MC interaction handler
function _attachMCHandlers(shuffled, q, isMultiCorrect, selected, submitted, mode, pool) {
  const optBtns = stage.querySelectorAll('.option');
  optBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (submitted) return;
      const lbl = btn.dataset.label;
      if (isMultiCorrect) {
        if (selected.has(lbl)) { selected.delete(lbl); btn.classList.remove('selected'); }
        else { selected.add(lbl); btn.classList.add('selected'); }
      } else {
        selected.clear();
        optBtns.forEach(b => b.classList.remove('selected'));
        selected.add(lbl); btn.classList.add('selected');
      }
    });
  });

  document.getElementById('mcSubmit').addEventListener('click', () => {
    if (submitted || selected.size === 0) return;
    submitted = true;
    const correctSet = new Set(q.correct_labels);
    const isCorrect = selected.size === correctSet.size && [...selected].every(l => correctSet.has(l));

    optBtns.forEach(btn => {
      btn.classList.add('disabled'); btn.classList.remove('selected');
      const lbl = btn.dataset.label;
      if (correctSet.has(lbl)) btn.classList.add('correct');
      else if (selected.has(lbl)) btn.classList.add('incorrect');
    });
    markAnswered(q.num, isCorrect);

    document.getElementById('mcFeedback').innerHTML = isCorrect
      ? `<div class="feedback correct"><span class="feedback-icon">✓</span><span>Richtig!</span></div>`
      : `<div class="feedback incorrect"><span class="feedback-icon">✗</span><span>Nicht ganz. Richtig ${correctSet.size === 1 ? 'ist' : 'sind'}: ${[...correctSet].sort().map(l => l.toUpperCase()).join(', ')}.</span></div>`;

    if (mode === 'mc_seq' && pool) {
      // In sequential mode: show next button but keep nav
      document.getElementById('mcActions').innerHTML = '';
    } else {
      document.getElementById('mcActions').innerHTML =
        `<button class="btn btn-primary" id="mcNext">Nächste Frage →</button>`;
      document.getElementById('mcNext').addEventListener('click', () => render());
    }
    updateProgressBar();
  });
}

// Shared seq nav helper
function _attachSeqNav(jumpId, poolLen, goTo) {
  const prevBtn = document.getElementById('seqPrev');
  const nextBtn = document.getElementById('seqNext');
  const jumpInput = document.getElementById(jumpId);

  if (prevBtn) prevBtn.addEventListener('click', () => {
    const cur = jumpId === 'mcJump' ? state.mcSeqIdx : state.freeSeqIdx;
    if (cur > 0) goTo(cur - 1);
  });
  if (nextBtn) nextBtn.addEventListener('click', () => {
    const cur = jumpId === 'mcJump' ? state.mcSeqIdx : state.freeSeqIdx;
    if (cur < poolLen - 1) goTo(cur + 1);
  });
  if (jumpInput) {
    const doJump = () => {
      const n = parseInt(jumpInput.value, 10);
      if (!isNaN(n) && n >= 1 && n <= poolLen) goTo(n - 1);
      else jumpInput.value = (jumpId === 'mcJump' ? state.mcSeqIdx : state.freeSeqIdx) + 1;
    };
    jumpInput.addEventListener('change', doJump);
    jumpInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); doJump(); jumpInput.blur(); } });
  }
}

function startExam() {
  // Pick 18 random questions, preferring unseen or difficult
  const shuffled = [...QUESTIONS].sort(() => Math.random() - 0.5);
  const selected = shuffled.slice(0, 18);
  state.exam = {
    questions: selected,
    currentIdx: 0,
    results: [] // { qnum, points, maxPoints }
  };
  render();
}

function renderExamQuestion(q) {
  const totalPointsSoFar = state.exam.results.reduce((a, r) => a + r.points, 0);

  const headerHTML = `
    <div class="exam-header">
      <div>
        <div class="title">Prüfung · Frage ${state.exam.currentIdx + 1} / 18</div>
      </div>
      <div class="points">${totalPointsSoFar} / 36 P.</div>
    </div>
  `;

  if (q.type === 'mc') {
    const shuffled = [...q.options].sort(() => Math.random() - 0.5);
    const isMultiCorrect = q.correct_labels.length > 1;
    let selected = new Set();
    let submitted = false;

    stage.innerHTML = `
      ${headerHTML}
      <div class="card">
        <div class="q-meta">
          <span class="q-number">FRAGE ${String(q.num).padStart(2,'0')}</span>
          <span class="q-type-badge">${isMultiCorrect ? 'MEHRFACHAUSWAHL' : 'EINFACHAUSWAHL'}</span>
        </div>
        <div class="question">${escapeHTML(q.question)}</div>
        <div class="options" id="exOpts">
          ${shuffled.map(opt => `
            <button class="option" data-label="${opt.label}">
              <span class="mark">${opt.label.toUpperCase()}</span>
              <span>${escapeHTML(opt.text)}</span>
            </button>
          `).join('')}
        </div>
        <div id="exFeedback"></div>
        <div class="actions" id="exActions">
          <button class="btn btn-primary" id="exSubmit">Antwort prüfen</button>
        </div>
      </div>
    `;

    const optBtns = stage.querySelectorAll('.option');
    optBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (submitted) return;
        const lbl = btn.dataset.label;
        if (isMultiCorrect) {
          if (selected.has(lbl)) { selected.delete(lbl); btn.classList.remove('selected'); }
          else { selected.add(lbl); btn.classList.add('selected'); }
        } else {
          selected.clear();
          optBtns.forEach(b => b.classList.remove('selected'));
          selected.add(lbl); btn.classList.add('selected');
        }
      });
    });

    document.getElementById('exSubmit').addEventListener('click', () => {
      if (submitted) return;
      if (selected.size === 0) return;
      submitted = true;

      const correctSet = new Set(q.correct_labels);
      const userSet = selected;
      const fullyCorrect =
        userSet.size === correctSet.size &&
        [...userSet].every(l => correctSet.has(l));
      // Partial: user picked some correct, no wrong ones
      const anyWrong = [...userSet].some(l => !correctSet.has(l));
      const anyRight = [...userSet].some(l => correctSet.has(l));
      const partiallyCorrect = !fullyCorrect && anyRight && !anyWrong;

      let points;
      if (fullyCorrect) points = 2;
      else if (partiallyCorrect) points = 1;
      else points = 0;

      state.exam.results.push({ qnum: q.num, points, maxPoints: 2, correct: fullyCorrect });
      markAnswered(q.num, fullyCorrect);

      optBtns.forEach(btn => {
        btn.classList.add('disabled'); btn.classList.remove('selected');
        const lbl = btn.dataset.label;
        if (correctSet.has(lbl)) btn.classList.add('correct');
        else if (userSet.has(lbl)) btn.classList.add('incorrect');
      });

      const pointsLabel = points === 2 ? 'Vollständig richtig (+2 P.)' : points === 1 ? 'Teilweise richtig (+1 P.)' : 'Falsch (+0 P.)';
      const cssClass = points >= 1 ? 'correct' : 'incorrect';
      const icon = points >= 1 ? '✓' : '✗';
      document.getElementById('exFeedback').innerHTML =
        `<div class="feedback ${cssClass}"><span class="feedback-icon">${icon}</span><span>${pointsLabel}</span></div>`;

      document.getElementById('exActions').innerHTML = `
        <button class="btn btn-primary" id="exNext">${state.exam.currentIdx === 17 ? 'Ergebnis ansehen →' : 'Nächste Frage →'}</button>
      `;
      document.getElementById('exNext').addEventListener('click', () => {
        state.exam.currentIdx++;
        render();
      });
    });

  } else {
    // Freetext in exam
    stage.innerHTML = `
      ${headerHTML}
      <div class="card">
        <div class="q-meta">
          <span class="q-number">FRAGE ${String(q.num).padStart(2,'0')}</span>
          <span class="q-type-badge free">FREITEXT</span>
        </div>
        <div class="question">${escapeHTML(q.question)}</div>
        <textarea class="freetext-input" id="exFtInput" placeholder="Deine Antwort…" autofocus></textarea>
        <div id="exFtReveal"></div>
        <div class="actions" id="exActions">
          <button class="btn btn-primary" id="exFtShow">Musterantwort zeigen</button>
        </div>
      </div>
    `;
    document.getElementById('exFtShow').addEventListener('click', () => {
      document.getElementById('exFtReveal').innerHTML = `
        <div class="reference-answer">
          <div class="ref-label">Musterantwort</div>
          <div>${renderAnswer(q.answer)}</div>
        </div>
        <div style="color: var(--text-dim); font-size: 13px; margin-top: 14px;">
          Wie vollständig war deine Antwort?
        </div>
      `;
      document.getElementById('exActions').innerHTML = `
        <button class="btn btn-success" id="exFt2">Vollständig richtig (+2 P.)</button>
        <button class="btn" style="background: rgba(244,192,93,0.12); border-color: rgba(244,192,93,0.35); color: var(--accent-yellow);" id="exFt1">Teilweise (+1 P.)</button>
        <button class="btn btn-danger" id="exFt0">Falsch (+0 P.)</button>
      `;
      const submit = (points) => {
        const correct = points === 2;
        state.exam.results.push({ qnum: q.num, points, maxPoints: 2, correct });
        markAnswered(q.num, correct);
        state.exam.currentIdx++;
        render();
      };
      document.getElementById('exFt2').addEventListener('click', () => submit(2));
      document.getElementById('exFt1').addEventListener('click', () => submit(1));
      document.getElementById('exFt0').addEventListener('click', () => submit(0));
    });
  }
}

function renderExamResults() {
  const totalPoints = state.exam.results.reduce((a, r) => a + r.points, 0);
  const maxPoints = state.exam.results.reduce((a, r) => a + r.maxPoints, 0);
  const passed = totalPoints >= 26;

  const correctCount = state.exam.results.filter(r => r.points === 2).length;
  const partialCount = state.exam.results.filter(r => r.points === 1).length;
  const wrongCount = state.exam.results.filter(r => r.points === 0).length;

  stage.innerHTML = `
    <div class="card">
      <div class="result-hero">
        <div class="result-score ${passed ? 'pass' : 'fail'}">${totalPoints}<span style="font-size:0.5em; color: var(--text-muted);"> / ${maxPoints}</span></div>
        <div class="result-verdict">${passed ? 'Bestanden ✓' : 'Nicht bestanden'}</div>
        <div class="result-detail">Grenze zum Bestehen: <strong>26 / 36</strong> Punkte</div>
      </div>
      <div class="stats-row">
        <div class="stat-box good"><div class="n">${correctCount}</div><div class="l">Richtig (2P)</div></div>
        <div class="stat-box neutral"><div class="n">${partialCount}</div><div class="l">Teilweise (1P)</div></div>
        <div class="stat-box bad"><div class="n">${wrongCount}</div><div class="l">Falsch (0P)</div></div>
      </div>
      <div class="actions" style="margin-top: 24px;">
        <button class="btn btn-primary" id="examAgain">Nochmal prüfen</button>
        <button class="btn" id="examReview">Fragen ansehen</button>
      </div>
      <div id="examReviewPanel"></div>
    </div>
  `;
  document.getElementById('examAgain').addEventListener('click', () => {
    state.exam = null;
    startExam();
  });
  document.getElementById('examReview').addEventListener('click', () => {
    const panel = document.getElementById('examReviewPanel');
    if (panel.innerHTML) { panel.innerHTML = ''; return; }
    panel.innerHTML = `
      <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);">
        ${state.exam.results.map((r, i) => {
          const q = state.exam.questions[i];
          const color = r.points === 2 ? 'var(--accent-green)' : r.points === 1 ? 'var(--accent-yellow)' : 'var(--accent-red)';
          return `
            <div style="padding: 12px 0; border-bottom: 1px solid var(--border);">
              <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">
                <span>Frage ${String(q.num).padStart(2,'0')}</span>
                <span style="color: ${color}; font-weight: 600;">${r.points}/2 P.</span>
              </div>
              <div style="font-size: 14px;">${escapeHTML(q.question)}</div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  });
}

// ───────── Stats box helper ─────────
function renderStatsBox(qNum) {
  const s = state.stats[qNum];
  const total = s.correct + s.wrong;
  const rate = total > 0 ? Math.round(s.correct / total * 100) : 0;
  return `
    <div class="stats-row">
      <div class="stat-box good"><div class="n">${s.correct}</div><div class="l">Richtig</div></div>
      <div class="stat-box bad"><div class="n">${s.wrong}</div><div class="l">Falsch</div></div>
      <div class="stat-box neutral"><div class="n">${total > 0 ? rate+'%' : '—'}</div><div class="l">Quote</div></div>
    </div>
  `;
}

function sumStats(key) {
  return Object.values(state.stats).reduce((a, s) => a + s[key], 0);
}

// ═══════════════════════════════════════════════════════════════════
//  UTIL
// ═══════════════════════════════════════════════════════════════════
function escapeHTML(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// Render free-text answer: detect "1. ... 2. ... 3. ..." patterns and render as list
function renderAnswer(text) {
  if (!text) return '';
  // Match sequence of "N. content" items where N starts at 1 and increments
  // Require at least 3 consecutive numbered items to avoid false positives
  const enumeratedRegex = /(?:^|\s)(\d+)\.\s+/g;
  const markers = [];
  let m;
  while ((m = enumeratedRegex.exec(text)) !== null) {
    markers.push({ num: parseInt(m[1], 10), start: m.index + (m[0].length - m[0].trimStart().length), matchLen: m[0].length, textStart: m.index + m[0].length });
  }
  // Check that markers form a valid 1,2,3,... sequence starting at 1
  if (markers.length < 2) return escapeHTML(text);
  for (let i = 0; i < markers.length; i++) {
    if (markers[i].num !== i + 1) return escapeHTML(text);
  }
  // Build list items
  const items = [];
  for (let i = 0; i < markers.length; i++) {
    const itemStart = markers[i].textStart;
    const itemEnd = (i + 1 < markers.length) ? markers[i + 1].start : text.length;
    // The start of marker[i+1] includes leading space; find the actual marker position
    let endCutoff = itemEnd;
    if (i + 1 < markers.length) {
      // Find the "N." before itemEnd and cut there
      // markers[i+1].start is the digit index after the leading whitespace
      endCutoff = markers[i + 1].start;
    }
    const itemText = text.substring(itemStart, endCutoff).trim().replace(/,$/, '');
    items.push(itemText);
  }
  return '<ol class="answer-list">' + items.map(it => `<li>${escapeHTML(it)}</li>`).join('') + '</ol>';
}
